<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calculator App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="container">
    <div class="calculator">
        <form>
            <div class="display">
                <input type="text" id="displayBtn">
            </div>

            <div>
                <input type="button" class="operator" value="AC" onclick="displayBtn.value = ''">
                <input type="button" class="operator" value="DE" onclick="displayBtn.value = displayBtn.value.slice(0,-1)">
                <input type="button" class="operator" value="." onclick="displayBtn.value += '.'">
                <input type="button" class="operator" value="/" onclick="displayBtn.value += '/'">
            </div>

            <div>
                <input type="button" value="7" onclick="displayBtn.value += '7'">
                <input type="button" value="8" onclick="displayBtn.value += '8'">
                <input type="button" value="9" onclick="displayBtn.value += '9'">
                <input type="button" class="operator" value="*" onclick="displayBtn.value += '*'">
            </div>

            <div>
                <input type="button" value="4" onclick="displayBtn.value += '4'">
                <input type="button" value="5" onclick="displayBtn.value += '5'">
                <input type="button" value="6" onclick="displayBtn.value += '6'">
                <input type="button" class="operator" value="-" onclick="displayBtn.value += '-'">
            </div>

            <div>
                <input type="button" value="1" onclick="displayBtn.value += '1'">
                <input type="button" value="2" onclick="displayBtn.value += '2'">
                <input type="button" value="3" onclick="displayBtn.value += '3'">
                <input type="button" class="operator" value="+" onclick="displayBtn.value += '+'">
            </div>

            <div>
                <input type="button" value="00" onclick="displayBtn.value += '00'">
                <input type="button" value="0" onclick="displayBtn.value += '0'">
                <input type="button" class="operator equal" value="=" onclick="displayBtn.value = eval(displayBtn.value)">
            </div>
        </form>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
